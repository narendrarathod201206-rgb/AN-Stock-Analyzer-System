{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>StockVision – Password Reset Complete</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'stock/css/styles.css' %}" />
    <link rel="stylesheet" href="{% static 'stock/css/auth.css' %}" />
</head>
<body class="auth-body">
    <div class="auth-bg">
        <div class="auth-orb orb1"></div>
        <div class="auth-orb orb2"></div>
        <div class="auth-orb orb3"></div>
    </div>

    <div class="auth-layout" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="auth-form-panel" style="width: 100%; max-width: 480px;">
            <div class="auth-card">
                <div class="auth-card-header">
                    <div class="auth-brand-mini">📈 StockVision</div>
                    <h2 class="auth-card-title">Password Reset!</h2>
                    <p class="auth-card-sub" style="color: #00c896">Your password has been successfully reset. You may go ahead and log in now.</p>
                </div>

                <div style="margin-top: 1.5rem;">
                    <a href="{% url 'stock:login' %}" style="text-decoration:none;">
                        <button type="button" class="auth-submit-btn">
                            <span class="auth-btn-text">Log in to your account</span>
                        </button>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
