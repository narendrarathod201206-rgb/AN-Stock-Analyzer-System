{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>StockVision – Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'stock/css/styles.css' %}" />
    <link rel="stylesheet" href="{% static 'stock/css/auth.css' %}" />
</head>
<body class="auth-body">
    <div class="auth-bg">
        <div class="auth-orb orb1"></div>
        <div class="auth-orb orb2"></div>
        <div class="auth-orb orb3"></div>
    </div>

    <div class="auth-layout" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="auth-form-panel" style="width: 100%; max-width: 480px;">
            <div class="auth-card">
                <div class="auth-card-header">
                    <div class="auth-brand-mini">📈 StockVision</div>
                    <h2 class="auth-card-title">Reset Password</h2>
                    <p class="auth-card-sub">Enter your email to receive a reset link</p>
                </div>

                <form class="auth-form" method="POST">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="auth-field">
                            <label class="auth-label">{{ field.label }}</label>
                            <div class="auth-input-wrap">
                                <span class="auth-input-icon">📧</span>
                                <input type="email" name="{{ field.name }}" id="{{ field.id_for_label }}" class="auth-input" placeholder="Enter your email" required />
                            </div>
                            {% if field.errors %}
                                <div class="auth-inline-err" style="display:block;">{{ field.errors.0 }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <button type="submit" class="auth-submit-btn">
                        <span class="auth-btn-text">Send Reset Link →</span>
                    </button>
                </form>
                
                <div class="auth-divider"><span>or</span></div>
                
                <div class="auth-switch">
                    Remembered your password?
                    <a href="{% url 'stock:login' %}" class="auth-link">Sign in →</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
