{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>StockVision – Reset Email Sent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'stock/css/styles.css' %}" />
    <link rel="stylesheet" href="{% static 'stock/css/auth.css' %}" />
</head>
<body class="auth-body">
    <div class="auth-bg">
        <div class="auth-orb orb1"></div>
        <div class="auth-orb orb2"></div>
        <div class="auth-orb orb3"></div>
    </div>

    <div class="auth-layout" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="auth-form-panel" style="width: 100%; max-width: 480px;">
            <div class="auth-card">
                <div class="auth-card-header">
                    <div class="auth-brand-mini">📈 StockVision</div>
                    <h2 class="auth-card-title">Email Sent</h2>
                    <p class="auth-card-sub">We've emailed you instructions for setting your password, if an account exists with the email you entered. You should receive them shortly.</p>
                </div>
                
                <div class="auth-switch" style="margin-top: 2rem;">
                    <a href="{% url 'stock:login' %}" class="auth-link">← Back to Log in</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
